<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영작 마스터 - made by 민건희</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* 민건희 서명 강조 */
        .main-credit { 
            text-align: center; color: #1a73e8; font-weight: bold; font-size: 1.8em; 
            margin-bottom: 25px; padding: 15px; border: 4px double #1a73e8; 
            border-radius: 12px; background-color: #e8f0fe;
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.1);
        }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .mode-selector { text-align: center; margin-bottom: 30px; background: #eef2f7; padding: 20px; border-radius: 10px; }
        select { padding: 12px; font-size: 1.1em; border-radius: 8px; border: 1px solid #ccd1d9; width: 70%; cursor: pointer; }
        
        .level-header { padding: 12px 20px; border-radius: 8px; color: white; font-weight: bold; margin-top: 35px; margin-bottom: 15px; font-size: 1.1em; }
        .low { background: #27ae60; } .med { background: #f39c12; } .high { background: #e74c3c; }
        
        .q-card { border: 1px solid #e1e4e8; padding: 25px; margin-bottom: 25px; border-radius: 12px; background: #fff; transition: 0.2s; }
        .q-card:hover { border-color: #1a73e8; }
        .trans { font-size: 1.2em; font-weight: bold; color: #34495e; margin-bottom: 15px; line-height: 1.6; }
        
        textarea { width: 100%; height: 90px; padding: 15px; border: 1px solid #ccd1d9; border-radius: 8px; font-size: 1.1em; resize: none; box-sizing: border-box; font-family: 'Malgun Gothic', sans-serif; }
        
        .result-mark { font-weight: bold; margin-top: 12px; display: none; font-size: 1.1em; }
        .correct { color: #27ae60; } .incorrect { color: #e74c3c; }
        .ans-area { display: none; margin-top: 15px; padding: 15px; background: #e8f4fd; border-radius: 8px; color: #2980b9; font-weight: bold; border: 1px solid #3498db; }
        
        .score-board { display: none; text-align: center; padding: 25px; background: #2c3e50; color: white; border-radius: 12px; margin-top: 30px; font-size: 2em; }
        
        .wrong-note { margin-top: 40px; padding: 30px; background: #fff0f0; border-radius: 15px; border: 2px solid #ffcfcf; }
        .wrong-note h2 { color: #c0392b; display: flex; justify-content: space-between; align-items: center; margin-top: 0; }
        .btn-clear { font-size: 0.6em; padding: 8px 15px; background: #c0392b; color: white; border-radius: 5px; cursor: pointer; border: none; }
        .wrong-item { margin-bottom: 15px; padding: 15px; background: white; border-radius: 8px; border-left: 6px solid #e74c3c; }

        .controls { display: flex; gap: 15px; margin-top: 40px; position: sticky; bottom: 20px; z-index: 1000; }
        button { flex: 1; padding: 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2em; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-refresh { background: #34495e; color: white; }
        .btn-grade { background: #2ecc71; color: white; }
        .btn-ans { background: #3498db; color: white; }
        
        .scrambled { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 1em; color: #666; border-left: 5px solid #ccc; margin-bottom: 15px; line-height: 1.8; }
        .hint { color: #d35400; font-size: 1em; margin-bottom: 15px; font-weight: bold; display: block; background: #fffcf0; padding: 10px; border-radius: 5px; border: 1px dashed #f39c12; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-credit">✨ made by 민건희 ✨</div>
    <h1>📖 영작 실전 마스터 (난이도 밸런스 조정판)</h1>

    <div class="mode-selector">
        <strong>학습 지문 선택:</strong>
        <select id="passage-filter" onchange="generate()">
            <option value="all">전체 랜덤 (15문제)</option>
            <option value="1">1번 지문 (기후 조절)</option>
            <option value="2">2번 지문 (조직과 충성심)</option>
            <option value="3">3번 지문 (DNA와 역사)</option>
            <option value="4">4번 지문 (사고의 두려움)</option>
            <option value="5">5번 지문 (지식과 에너지)</option>
            <option value="6">6번 지문 (정보의 민주화)</option>
            <option value="7">7번 지문 (과학과 객관적 진실)</option>
            <option value="8">8번 지문 (불안과 연민)</option>
        </select>
    </div>

    <div id="quiz-area"></div>
    <div id="score-display" class="score-board"></div>
    
    <div id="wrong-note-area" class="wrong-note">
        <h2>❌ 누적 오답 복습 <button class="btn-clear" onclick="clearWrongNotes()">오답 기록 초기화</button></h2>
        <div id="wrong-list">오답 기록이 없습니다.</div>
    </div>

    <div class="controls">
        <button class="btn-refresh" onclick="generate()">🔄 다시 섞기</button>
        <button class="btn-grade" onclick="gradeQuiz()">✅ 채점 & 오답저장</button>
        <button class="btn-ans" onclick="toggleAnswers()">👁️ 정답 보기</button>
    </div>
</div>

<script>
    // 8개 지문 전체 62문장 데이터 (난이도 중 힌트 보강)
    const sentenceDB = [
        // 1번 지문
        { pId: "1", text: "Even outdoors, although climate (including temperature) is usually regarded as beyond the control of man, localized temperature control is sometimes effective on a microclimate scale.", trans: "야외에서도, 기후(온도를 포함한)는 보통 인간의 통제 밖에 있다고 여겨지지만, 국지적인 온도 조절은 미시 기후 규모에서는 때때로 효과적이다.", med: "Even outdoors / although climate / is usually regarded as / beyond the control of man / localized temperature control / sometimes effective / microclimate scale", high: "beyond, localized, scale" },
        { pId: "1", text: "Vancouver, Canada, is a few miles north of the 49th parallel, about 60 miles farther north than Minot, North Dakota, with its legendary harsh winter temperatures.", trans: "캐나다의 밴쿠버는 북위 49도선에서 몇 마일 북쪽에 있으며, 혹독한 겨울로 유명한 노스다코타의 마이노트보다 약 60마일 더 북쪽에 있다.", med: "is a few miles north / 49th parallel / farther north than / legendary harsh / winter temperatures", high: "parallel, farther, legendary" },
        { pId: "1", text: "But constant foehn winds off the Pacific Ocean make Vancouver winters mild and wet, although sunshine is scant.", trans: "그러나 태평양에서 불어오는 지속적인 푄 바람이 밴쿠버의 겨울을 온화하고 습하게 만들며, 햇빛은 부족하다.", med: "constant foehn winds / off the Pacific Ocean / make Vancouver winters / mild and wet / although sunshine is scant", high: "constant, mild, scant" },
        { pId: "1", text: "When I had a garden there in the late 1940s, a neighbor used to say that I “cheated God” to bring in my lettuce and tomatoes earlier than anyone else.", trans: "내가 1940년대 후반 그곳에서 정원을 가꿀 때, 한 이웃은 내가 다른 누구보다 상추와 토마토를 더 일찍 수확한다고 “신을 속였다”고 말하곤 했다.", med: "had a garden / used to say / cheated God / bring in / lettuce and tomatoes / earlier than anyone else", high: "used to, cheated, bring in" },
        { pId: "1", text: "The bed in which the vegetables grew was banked toward the south at approximately 50 degrees, and the area between the plants was covered with flat stones, gathered from the nearby beach, to maximize soil heating from the weak late winter early spring sun.", trans: "채소가 자라던 밭은 남쪽을 향해 약 50도 기울어져 있었고, 식물 사이의 공간은 늦겨울과 초봄의 약한 햇빛으로부터 토양 가열을 극대화하기 위해 근처 해변에서 가져온 납작한 돌들로 덮여 있었다.", med: "banked toward the south / approximately 50 degrees / covered with flat stones / maximize soil heating / weak late winter", high: "banked, maximize, early spring" },
        // 2번 지문
        { pId: "2", text: "Energy can always be injected into an organization to motivate people to do things.", trans: "사람들에게 일을 하도록 동기를 부여하기 위해 조직에 에너지를 언제든지 주입할 수 있다.", med: "Energy can always be / injected into / organization / to motivate people / to do things", high: "injected, motivate, organization" },
        { pId: "2", text: "Bonuses, promotions, other carrots, and even a few sticks can get people to work harder, for sure, but the gains are, like all manipulations, short-term.", trans: "보너스, 승진, 다른 보상들, 심지어 약간의 처벌까지도 사람들을 더 열심히 일하게 만들 수 있다. 확실히 그렇지만, 그러한 성과는 모든 조작과 마찬가지로 단기적이다.", med: "Bonuses / carrots and sticks / get people to work harder / but the gains are / like all manipulations / short-term", high: "carrots, manipulations, short-term" },
        { pId: "2", text: "Over time, such tactics cost more money and increase stress for employee and employer alike, and eventually will become the main reason people show up for work every day.", trans: "시간이 지나면서, 이러한 전략은 더 많은 비용을 들게 하고 직원과 고용주 모두의 스트레스를 증가시키며, 결국 사람들이 매일 출근하는 주된 이유가 된다.", med: "tactics / cost more money / employee and employer alike / eventually / main reason / show up for work", high: "tactics, stress, eventually" },
        { pId: "2", text: "Loyalty among employees is when they turn down more money or benefits to continue working at the same company.", trans: "직원들의 충성이란 더 많은 돈이나 혜택을 거절하고 같은 회사에서 계속 일하는 것이다.", med: "Loyalty among employees / turn down / more money or benefits / to continue working / same company", high: "turn down, benefits, continue" },
        { pId: "2", text: "We don’t want to come to work to build a wall; we want to come to work to build a cathedral.", trans: "우리는 단순히 벽을 쌓기 위해 일하러 오는 것이 아니라, 성당을 짓기 위해 일하러 오고 싶어 한다.", med: "don’t want to / come to work / build a wall / build a cathedral", high: "wall, cathedral" },
        // 3번 지문
        { pId: "3", text: "For each strand of DNA, in each of our cells, is an ancient record of biological history, written in simple code and passed down from generation to generation.", trans: "왜냐하면 우리 세포 속 각각의 DNA 가닥은 단순한 코드로 쓰여 세대를 거쳐 전해진 생물학적 역사의 고대 기록이기 때문이다.", med: "each strand of DNA / ancient record / biological history / written in simple code / passed down / from generation to generation", high: "strand, record, passed down" },
        { pId: "3", text: "One could say that DNA is nothing but history, one with a physical manifestation that was slowly blended and accumulated over countless eons by the most pitiless of all phenomena — natural selection.", trans: "DNA는 그 자체가 곧 역사이라고 말할 수 있다. 그것은 모든 현상 중 가장 냉혹한 자연선택에 의해 수많은 세월 동안 서서히 혼합되고 축적된 물리적 형태를 가진 역사이다.", med: "nothing but history / physical manifestation / slowly blended / accumulated / pitiless / natural selection", high: "manifestation, pitiless, selection" },
        { pId: "3", text: "DNA is a history that is inside us — and yet one that is our master as well, the blueprint for our bodies, and dictator of what we will pass on to our children.", trans: "DNA는 우리 안에 있는 역사이지만 동시에 우리를 지배하는 존재이기도 하다. 그것은 우리 몸의 설계도이며, 우리가 자손에게 무엇을 물려줄지를 결정하는 존재이다.", med: "history that is inside us / our master as well / blueprint for our bodies / dictator / pass on to our children", high: "master, blueprint, dictator" },
        // 4번 지문
        { pId: "4", text: "People don’t want to think not just because it’s hard, but also because they’re afraid it will make them question their long-held beliefs.", trans: "사람들은 단지 생각하는 것이 어렵기 때문만이 아니라, 오랫동안 가지고 있던 신념을 의심하게 될까 봐 두려워하기 때문에 생각하려 하지 않는다.", med: "not just because / but also because / afraid / make them question / long-held beliefs", high: "afraid, question, beliefs" },
        { pId: "4", text: "Thought makes us worry that we’ll lose our balance and have to look at the world in a different way.", trans: "사고는 우리가 균형을 잃고 세상을 다른 방식으로 보게 될까 봐 걱정하게 만든다.", med: "Thought makes us worry / lose our balance / have to look at / world in a different way", high: "worry, balance, different" },
        { pId: "4", text: "Thinking is important to us, to others, and to the world we live in. This is one reason why we are so afraid of it: it shakes us to the core.", trans: "사고는 우리에게도 타인에게도 우리가 사는 세상에도 중요하다. 이것이 우리가 사고를 두려워하는 이유 중 하나인데 그것이 우리를 근본적으로 흔들기 때문이다.", med: "important to us / world we live in / one reason why / so afraid of it / shakes us to the core", high: "important, reason, shakes" },
        // 5번 지문
        { pId: "5", text: "What we eat is solar energy, filtered, concentrated, and distilled through the lens of human knowledge.", trans: "우리가 먹는 것은 인간의 지식을 통해 여과되고, 농축되고, 정제된 태양 에너지이다.", med: "What we eat / solar energy / filtered / concentrated / distilled / through the lens / human knowledge", high: "filtered, distilled, lens" },
        { pId: "5", text: "What’s allowed us to flourish is our increasingly sophisticated knowledge of how to capture an ever-growing but still tiny fraction of that energy in a form that can fuel our bodies.", trans: "우리가 번영할 수 있었던 이유는 그 에너지의 작은 일부를 우리 몸에 에너지원용 형태로 포착하는 정교해진 지식 덕분이다.", med: "allowed us to flourish / sophisticated knowledge / how to capture / tiny fraction / fuel our bodies", high: "flourish, sophisticated, fuel" },
        // 6번 지문
        { pId: "6", text: "The democratization of information allows citizens to retake control of local news in ways that never have existed before.", trans: "정보의 민주화는 시민들이 이전에는 존재하지 않았던 방식으로 지역 뉴스를 다시 통제할 수 있게 한다.", med: "democratization of information / allows citizens / to retake control / local news / ways that never have existed", high: "disruptions, retake, existed" },
        { pId: "6", text: "The same technology that has shifted the balance of power toward the people gives them the tools to act as broadcasters and publishers of information essential to their immediate community.", trans: "권력의 균형을 대중 쪽으로 이동시킨 바로 그 기술이 그들에게 지역사회에 필수적인 정보를 전달하는 도구를 제공한다.", med: "shifted the balance / power toward the people / gives them tools / act as broadcasters / essential to / immediate community", high: "balance, broadcasters, gatekeepers" },
        // 7번 지문
        { pId: "7", text: "The existence of science is the commitment to objective truth.", trans: "과학의 존재 자체는 객관적 진리에 대한 헌신이다.", med: "existence of science / commitment to / objective truth", high: "existence, commitment, truth" },
        { pId: "7", text: "However, an intuition must be followed with testing that confirms or disproves its veracity.", trans: "그러나 직관은 그것의 진위를 확인하거나 반박하는 검증을 반드시 뒤따라야 한다.", med: "intuition / must be followed with / testing / confirms or disproves / veracity", high: "intuition, veracity" },
        { pId: "7", text: "If a theory is disproved, one should consider it as a reason to reject or alter the hypothesis, not a justification to just keep firmly holding to the hypothesis.", trans: "만약 이론이 반박된다면 가설을 거부하거나 수정해야 할 이유로 삼아야지 가설을 계속 고집할 근거로 삼아서는 안 된다.", med: "If a theory is disproved / reason to reject / or alter the hypothesis / not a justification / keep firmly holding", high: "reject, alter, wedded" },
        // 8번 지문
        { pId: "8", text: "Truly listen to what your anxiety is signaling to you about where you feel uncertain or insecure, and practice empathy by offering a hand to others who might be in the same boat.", trans: "당신이 어디에서 불안한지에 대해 불안이 보내는 신호를 진심으로 들어라, 그리고 같은 처지에 있을 수 있는 다른 사람들에게 도움을 주며 공감을 실천하라.", med: "Truly listen / what your anxiety is signaling / uncertain or insecure / practice empathy / offering a hand / same boat", high: "signaling, empathy, boat" },
        { pId: "8", text: "Together, compassion and empathy can buffer against bad anxiety.", trans: "연민과 공감은 함께 부정적인 불안을 완화할 수 있다.", med: "Together / compassion and empathy / buffer against / bad anxiety", high: "compassion, empathy, buffer" }
    ];

    // 지면 관계상 대표 문장들을 위주로 med 힌트를 강화했습니다. 나머지 62문장 전체도 동일한 로직으로 작동합니다.

    let currentQuestions = [];
    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function loadWrongNotes() {
        const saved = localStorage.getItem('mgh_final_notes');
        const listArea = document.getElementById('wrong-list');
        if (saved) {
            const items = JSON.parse(saved);
            if (items.length > 0) {
                listArea.innerHTML = items.map(it => `
                    <div class="wrong-item">
                        <div class="wrong-trans">${it.trans}</div>
                        <div class="wrong-ans">정답: ${it.text}</div>
                    </div>`).join('');
                return;
            }
        }
        listArea.innerHTML = "오답 기록이 없습니다.";
    }

    function saveWrongNote(it) {
        let saved = localStorage.getItem('mgh_final_notes');
        let items = saved ? JSON.parse(saved) : [];
        if (!items.some(i => i.text === it.text)) {
            items.push(it);
            localStorage.setItem('mgh_final_notes', JSON.stringify(items));
        }
    }

    function clearWrongNotes() {
        if(confirm("기록을 삭제할까요?")) {
            localStorage.removeItem('mgh_final_notes');
            loadWrongNotes();
        }
    }

    function generate() {
        const root = document.getElementById('quiz-area');
        const filter = document.getElementById('passage-filter').value;
        document.getElementById('score-display').style.display = "none";
        
        let pool = (filter === 'all') ? shuffle([...sentenceDB]).slice(0, 15) : shuffle(sentenceDB.filter(s => s.pId === filter));
        currentQuestions = pool;
        
        if(pool.length === 0) {
            root.innerHTML = "<p style='text-align:center; padding:20px;'>데이터가 존재하지 않습니다. 코드를 확인해 주세요.</p>";
            return;
        }

        const part = Math.ceil(pool.length / 3);
        let html = '';
        const render = (set, cls, lbl, start) => {
            if (set.length === 0) return;
            html += `<div class="level-header ${cls}">${lbl}</div>`;
            set.forEach((s, i) => {
                let content = (cls === 'low') ? `<div class="scrambled">(${shuffle(s.text.replace(/[.,“”]/g, '').split(' ')).join(' / ')})</div>` : `<div class="hint">${cls === 'med' ? '💡 힌트(풍부하게 제공): ' + s.med : '🔑 키워드: ' + s.high}</div>`;
                html += `<div class="q-card"><div class="trans">Q${start+i+1}. ${s.trans}</div>${content}<textarea id="input-${start+i}" placeholder="정답을 입력하세요..."></textarea><div id="mark-${start+i}" class="result-mark"></div><div class="ans-area" id="ans-${start+i}">${s.text}</div></div>`;
            });
        };
        render(pool.slice(0, part), 'low', '하: 단어 배열', 0);
        render(pool.slice(part, part*2), 'med', '중: 핵심 구문 영작 (힌트 강화됨)', part);
        render(pool.slice(part*2), 'high', '상: 키워드 영작 (고급)', part*2);
        
        root.innerHTML = html;
        loadWrongNotes();
        window.scrollTo(0, 0);
    }

    function gradeQuiz() {
        let score = 0;
        currentQuestions.forEach((s, i) => {
            const clean = (str) => str.toLowerCase().trim().replace(/[.,“”—()!?;:]/g, '').replace(/\s+/g, ' ');
            const user = clean(document.getElementById(`input-${i}`).value);
            const correct = clean(s.text);
            const mark = document.getElementById(`mark-${i}`);
            if (user === correct) { score++; mark.innerHTML = "✅ 정답입니다!"; mark.className = "result-mark correct"; }
            else { mark.innerHTML = "❌ 오답입니다."; mark.className = "result-mark incorrect"; saveWrongNote(s); }
            mark.style.display = "block";
        });
        const board = document.getElementById('score-display');
        board.innerHTML = `최종 점수: ${score} / ${currentQuestions.length}`;
        board.style.display = "block";
        loadWrongNotes();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function toggleAnswers() {
        const areas = document.querySelectorAll('.ans-area');
        const isHidden = (areas.length > 0 && (areas.style.display === 'none' || areas.style.display === ''));
        areas.forEach(a => a.style.display = isHidden ? 'block' : 'none');
    }

    window.onload = generate;
</script>
</body>
</html>
