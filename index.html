<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영작 마스터 - made by 민건희</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* 민건희 서명 강조 스타일 */
        .main-credit { 
            text-align: center; color: #1a73e8; font-weight: bold; font-size: 1.6em; 
            margin-bottom: 20px; padding: 15px; border: 3px double #1a73e8; 
            border-radius: 10px; background-color: #e8f0fe;
        }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .mode-selector { text-align: center; margin-bottom: 30px; background: #eef2f7; padding: 15px; border-radius: 10px; }
        select { padding: 10px; font-size: 1em; border-radius: 5px; border: 1px solid #ccd1d9; width: 60%; cursor: pointer; }
        
        .level-header { padding: 12px 20px; border-radius: 8px; color: white; font-weight: bold; margin-top: 35px; margin-bottom: 15px; }
        .low { background: #27ae60; } .med { background: #f39c12; } .high { background: #e74c3c; }
        
        .q-card { border: 1px solid #e1e4e8; padding: 25px; margin-bottom: 20px; border-radius: 12px; background: #fff; }
        .trans { font-size: 1.1em; font-weight: bold; color: #34495e; margin-bottom: 12px; line-height: 1.6; }
        textarea { width: 100%; height: 80px; padding: 15px; border: 1px solid #ccd1d9; border-radius: 8px; font-size: 1.05em; resize: none; box-sizing: border-box; }
        
        .result-mark { font-weight: bold; margin-top: 12px; display: none; font-size: 1.1em; }
        .correct { color: #27ae60; } .incorrect { color: #e74c3c; }
        .ans-area { display: none; margin-top: 10px; padding: 12px; background: #e8f4fd; border-radius: 6px; color: #2980b9; font-weight: bold; border: 1px solid #3498db; }
        
        .score-board { display: none; text-align: center; padding: 25px; background: #2c3e50; color: white; border-radius: 12px; margin-top: 30px; font-size: 1.8em; }
        
        .wrong-note { margin-top: 40px; padding: 30px; background: #fff0f0; border-radius: 15px; border: 2px solid #ffcfcf; }
        .wrong-note h2 { color: #c0392b; display: flex; justify-content: space-between; align-items: center; margin-top: 0; }
        .btn-clear { font-size: 0.5em; padding: 5px 10px; background: #c0392b; color: white; border-radius: 5px; cursor: pointer; border: none; }
        .wrong-item { margin-bottom: 15px; padding: 15px; background: white; border-radius: 8px; border-left: 5px solid #e74c3c; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .controls { display: flex; gap: 15px; margin-top: 40px; position: sticky; bottom: 20px; z-index: 1000; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-refresh { background: #34495e; color: white; }
        .btn-grade { background: #2ecc71; color: white; }
        .btn-ans { background: #3498db; color: white; }
        
        .scrambled { background: #f8f9fa; padding: 12px; border-radius: 5px; font-size: 0.9em; color: #666; border-left: 4px solid #ccc; margin-bottom: 10px; }
        .hint { color: #d35400; font-size: 0.9em; margin-bottom: 10px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-credit">✨ made by 민건희 ✨</div>
    <h1>📖 영작 실전 마스터 (62문장 전체 수록)</h1>

    <div class="mode-selector">
        <strong>학습 지문 선택:</strong>
        <select id="passage-filter" onchange="generate()">
            <option value="all">전체 랜덤 (15문제)</option>
            <option value="1">1번 지문 (기후 조절)</option>
            <option value="2">2번 지문 (조직과 충성심)</option>
            <option value="3">3번 지문 (DNA와 역사)</option>
            <option value="4">4번 지문 (사고의 두려움)</option>
            <option value="5">5번 지문 (지식과 에너지)</option>
            <option value="6">6번 지문 (정보의 민주화)</option>
            <option value="7">7번 지문 (과학과 객관적 진실)</option>
            <option value="8">8번 지문 (불안과 연민)</option>
        </select>
    </div>

    <div id="quiz-area"></div>
    <div id="score-display" class="score-board"></div>
    
    <div id="wrong-note-area" class="wrong-note">
        <h2>❌ 누적 오답 복습 <button class="btn-clear" onclick="clearWrongNotes()">기록 초기화</button></h2>
        <div id="wrong-list">오답 기록이 없습니다.</div>
    </div>

    <div class="controls">
        <button class="btn-refresh" onclick="generate()">🔄 문제 다시 섞기</button>
        <button class="btn-grade" onclick="gradeQuiz()">✅ 채점 & 오답저장</button>
        <button class="btn-ans" onclick="toggleAnswers()">👁️ 정답 보기/숨기기</button>
    </div>
</div>

<script>
    const sentenceDB = [
        // [2-4] 1번 지문 (5문장)
        { pId: "1", text: "Even outdoors, although climate (including temperature) is usually regarded as beyond the control of man, localized temperature control is sometimes effective on a microclimate scale.", trans: "야외에서도, 기후(온도를 포함한)는 보통 인간의 통제 밖에 있다고 여겨지지만, 국지적인 온도 조절은 미시 기후 규모에서는 때때로 효과적이다.", med: "regarded as, beyond the control", high: "beyond, localized" },
        { pId: "1", text: "Vancouver, Canada, is a few miles north of the 49th parallel, about 60 miles farther north than Minot, North Dakota, with its legendary harsh winter temperatures.", trans: "캐나다의 밴쿠버는 북위 49도선에서 몇 마일 북쪽에 있으며, 혹독한 겨울로 유명한 노스다코타의 마이노트보다 약 60마일 더 북쪽에 있다.", med: "farther north than", high: "parallel, legendary" },
        { pId: "1", text: "But constant foehn winds off the Pacific Ocean make Vancouver winters mild and wet, although sunshine is scant.", trans: "그러나 태평양에서 불어오는 지속적인 푄 바람이 밴쿠버의 겨울을 온화하고 습하게 만들며, 햇빛은 부족하다.", med: "winds off, mild and wet, scant", high: "constant, mild, scant" },
        { pId: "1", text: "When I had a garden there in the late 1940s, a neighbor used to say that I “cheated God” to bring in my lettuce and tomatoes earlier than anyone else.", trans: "내가 1940년대 후반 그곳에서 정원을 가꿀 때, 한 이웃은 내가 다른 누구보다 상추와 토마토를 더 일찍 수확한다고 “신을 속였다”고 말하곤 했다.", med: "used to say, cheated God", high: "used to, cheated" },
        { pId: "1", text: "The bed in which the vegetables grew was banked toward the south at approximately 50 degrees, and the area between the plants was covered with flat stones, gathered from the nearby beach, to maximize soil heating from the weak late winter early spring sun.", trans: "채소가 자라던 밭은 남쪽을 향해 약 50도 기울어져 있었고, 식물 사이의 공간은 늦겨울과 초봄의 약한 햇빛으로부터 토양 가열을 극대화하기 위해 근처 해변에서 가져온 납작한 돌들로 덮여 있었다.", med: "banked toward, covered with", high: "maximize, spring sun" },
        // [4-6] 2번 지문 (10문장)
        { pId: "2", text: "Energy can always be injected into an organization to motivate people to do things.", trans: "사람들에게 일을 하도록 동기를 부여하기 위해 조직에 에너지를 언제든지 주입할 수 있다.", med: "injected into, motivate", high: "injected, organization" },
        { pId: "2", text: "Bonuses, promotions, other carrots, and even a few sticks can get people to work harder, for sure, but the gains are, like all manipulations, short-term.", trans: "보너스, 승진, 다른 보상들, 심지어 약간의 처벌까지도 사람들을 더 열심히 일하게 만들 수 있다. 확실히 그렇지만, 그러한 성과는 모든 조작과 마찬가지로 단기적이다.", med: "carrots and sticks, manipulations", high: "carrots, short-term" },
        { pId: "2", text: "Over time, such tactics cost more money and increase stress for employee and employer alike, and eventually will become the main reason people show up for work every day.", trans: "시간이 지나면서, 이러한 전략은 더 많은 비용을 들게 하고 직원과 고용주 모두의 스트레스를 증가시키며, 결국 사람들이 매일 출근하는 주된 이유가 된다.", med: "tactics, employer alike", high: "tactics, eventually" },
        { pId: "2", text: "That’s not loyalty.", trans: "그것은 충성이 아니다.", med: "not loyalty", high: "loyalty" },
        { pId: "2", text: "That’s the employee version of repeat business.", trans: "그것은 직원판 반복 구매에 불과하다.", med: "repeat business", high: "version, repeat" },
        { pId: "2", text: "Loyalty among employees is when they turn down more money or benefits to continue working at the same company.", trans: "직원들의 충성이란 더 많은 돈이나 혜택을 거절하고 같은 회사에서 계속 일하는 것이다.", med: "turn down, benefits", high: "turn down, continue" },
        { pId: "2", text: "Loyalty to a company trumps pay and benefits.", trans: "회사에 대한 충성은 급여와 복지보다 더 중요하다.", med: "trumps pay", high: "trumps, benefits" },
        { pId: "2", text: "And unless you’re an astronaut, it’s not the work we do that inspires us either.", trans: "그리고 당신이 우주비행사가 아닌 이상, 우리가 하는 일이 우리에게 영감을 주는 것도 아니다.", med: "unless, inspires us either", high: "astronaut, inspires" },
        { pId: "2", text: "It’s the cause that we come to work for.", trans: "우리가 일을 하러 오는 이유는 ‘목적’ 때문이다.", med: "the cause that, come to work for", high: "cause, come to work" },
        { pId: "2", text: "We don’t want to come to work to build a wall; we want to come to work to build a cathedral.", trans: "우리는 단순히 벽을 쌓기 위해 일하러 오는 것이 아니라, 성당을 짓기 위해 일하러 오고 싶어 한다.", med: "build a cathedral", high: "wall, cathedral" },
        // [7-9] 3번 지문 (6문장)
        { pId: "3", text: "In the early 1960s the great American writer James Baldwin wrote: “People are trapped in history, and history is trapped in them.”", trans: "1960년대 초, 위대한 미국 작가 제임스 볼드윈은 “사람들은 역사에 갇혀 있고, 역사는 그들 안에 갇혀 있다.”라고 썼다.", med: "trapped in history", high: "trapped" },
        { pId: "3", text: "He was speaking to race when he penned those words.", trans: "그는 그 말을 쓸 때 인종 문제를 염두에 두고 있었다.", med: "penned those words", high: "race, penned" },
        { pId: "3", text: "For each strand of DNA, in each of our cells, is an ancient record of biological history, written in simple code and passed down from generation to generation.", trans: "왜냐하면 우리 세포 속 각각의 DNA 가닥은 단순한 코드로 쓰여 세대를 거쳐 전해진 생물학적 역사의 고대 기록이기 때문이다.", med: "ancient record, passed down", high: "strand, record" },
        { pId: "3", text: "One could say that DNA is nothing but history, one with a physical manifestation that was slowly blended and accumulated over countless eons by the most pitiless of all phenomena — natural selection.", trans: "DNA는 그 자체가 곧 역사이라고 말할 수 있다. 그것은 모든 현상 중 가장 냉혹한 자연선택에 의해 수많은 세월 동안 서서히 혼합되고 축적된 물리적 형태를 가진 역사이다.", med: "manifestation, accumulated", high: "manifestation, pitiless" },
        { pId: "3", text: "DNA is a history that is inside us — and yet one that is our master as well, the blueprint for our bodies, and dictator of what we will pass on to our children, gifts that can be blessings — or deadly time bombs.", trans: "DNA는 우리 안에 있는 역사이지만 동시에 우리를 지배하는 존재이기도 하다. 그것은 우리 몸의 설계도이며, 우리가 자손에게 무엇을 물려줄지를 결정하는 존재로, 그 유전자는 축복이 될 수도 있고 치명적인 시한폭탄이 될 수도 있다.", med: "blueprint, dictator", high: "master, blueprint, deadly" },
        { pId: "3", text: "We are indeed trapped in this particular vehicle of history as much as it is trapped in us.", trans: "우리는 이 특정한 ‘역사의 매개체’에 갇혀 있으며, 그것 역시 우리 안에 갇혀 있는 것이 사실이다.", med: "indeed trapped in, particular vehicle", high: "indeed, particular, vehicle" },
        // [9-12] 4번 지문 (12문장)
        { pId: "4", text: "People may not think critically for a variety of reasons, such as laziness and inability, but fear is a big one.", trans: "사람들은 게으름이나 능력 부족과 같은 다양한 이유로 비판적으로 사고하지 않을 수 있지만, 두려움이 큰 이유 중 하나이다.", med: "critically, laziness", high: "critically, laziness, fear" },
        { pId: "4", text: "People don’t want to think not just because it’s hard, but also because they’re afraid it will make them question their long-held beliefs.", trans: "사람들은 단지 생각하는 것이 어렵기 때문만이 아니라, 오랫동안 가지고 있던 신념을 의심하게 될까 봐 두려워하기 때문에 생각하려 하지 않는다.", med: "not just, but also, question", high: "afraid, beliefs" },
        { pId: "4", text: "Your students most likely do want to think about things that can be very controversial, like politics, ethics, and philosophy.", trans: "당신의 학생들은 정치, 윤리, 철학과 같은 매우 논쟁적인 주제에 대해 생각하고 싶어 할 가능성이 크다.", med: "most likely, controversial", high: "controversial, ethics" },
        { pId: "4", text: "But probe even deeper.", trans: "그러나 더 깊이 파고들어 보라.", med: "probe even deeper", high: "probe" },
        { pId: "4", text: "Once we start thinking deeply, long-held assumptions are challenged.", trans: "우리가 깊이 생각하기 시작하면, 오래된 가정들이 도전을 받게 된다.", med: "assumptions are challenged", high: "assumptions, challenged" },
        { pId: "4", text: "Thought makes us worry that we’ll lose our balance and have to look at the world in a different way.", trans: "사고는 우리가 균형을 잃고 세상을 다른 방식으로 보게 될까 봐 걱정하게 만든다.", med: "lose our balance, different way", high: "worry, balance" },
        { pId: "4", text: "We worry about thinking because we care about what we and other people think.", trans: "우리는 우리 자신과 다른 사람들이 무엇을 생각하는지 중요하게 여기기 때문에 사고를 두려워한다.", med: "care about", high: "care, think" },
        { pId: "4", text: "Even the most far-fetched ideas have an effect on the world.", trans: "아무리 터무니없는 생각이라도 세상에 영향을 미친다.", med: "far-fetched ideas", high: "far-fetched, effect" },
        { pId: "4", text: "Non-Euclidean geometry and symbolic logic are about as abstract as thinking can get, but you can’t understand Einsteinian gravity without the first and run computers without the second.", trans: "비유클리드 기하학과 기호 논리는 매우 추상적인 사고의 예이지만, 전자 없이는 아인슈타인의 중력을 이해할 수 없고 후자 없이는 컴퓨터를 작동시킬 수 없다.", med: "abstract, gravity", high: "abstract, gravity, computers" },
        { pId: "4", text: "Thinking is important to us, to others, and to the world we live in.", trans: "사고는 우리에게도, 타인에게도, 그리고 우리가 사는 세상에도 중요하다.", med: "to others, world we live in", high: "important, live in" },
        { pId: "4", text: "This is one reason why we are so afraid of it: it shakes us to the core.", trans: "이것이 우리가 사고를 그렇게 두려워하는 이유 중 하나인데, 그것이 우리를 근본적으로 흔들기 때문이다.", med: "shakes us to the core", high: "reason, shakes, core" },
        { pId: "4", text: "Why is that?", trans: "왜 그럴까?", med: "Why is that?", high: "Why" },
        // [12-14] 5번 지문 (6문장)
        { pId: "5", text: "There’s a saying that “you can’t eat information.”", trans: "“정보는 먹을 수 없다”라는 말이 있다.", med: "There’s a saying", high: "saying, eat" },
        { pId: "5", text: "That may be so, but the food we eat today is the fruit of thousands of years of increasingly high-quality information — the knowledge of how to farm.", trans: "그것이 사실일 수도 있지만, 오늘날 우리가 먹는 음식은 수천 년 동안 점점 더 발전해 온 고품질 정보의 산물이다 — 즉, 농사에 대한 지식이다.", med: "fruit of, high-quality information", high: "fruit, farm" },
        { pId: "5", text: "What we eat is solar energy, filtered, concentrated, and distilled through the lens of human knowledge.", trans: "우리가 먹는 것은 인간의 지식을 통해 여과되고, 농축되고, 정제된 태양 에너지이다.", med: "solar energy, distilled", high: "filtered, distilled, lens" },
        { pId: "5", text: "The energy the Earth receives from the sun each year has remained more or less constant through all of human civilization.", trans: "지구가 매년 태양으로부터 받는 에너지는 인류 문명 전체를 통틀어 거의 일정하게 유지되어 왔다.", med: "receives from, constant", high: "receives, civilization" },
        { pId: "5", text: "What’s allowed us to flourish is our increasingly sophisticated knowledge of how to capture an ever-growing but still tiny fraction of that energy in a form that can fuel our bodies.", trans: "우리가 번영할 수 있었던 이유는 그 에너지의 점점 더 커지지만 여전히 작은 일부를 우리 몸에 에너지원용 형태로 포착하는 정교해진 지식 덕분이다.", med: "flourish, sophisticated, capture", high: "sophisticated, fuel" },
        { pId: "5", text: "Every step in the advancement of our knowledge has brought with it an increase in the amount of energy we can tap into.", trans: "우리의 지식이 발전하는 모든 단계는 우리가 활용할 수 있는 에너지의 양 증가를 동반해 왔다.", med: "advancement, tap into", high: "advancement, amount" },
        // [15-18] 6번 지문 (5문장)
        { pId: "6", text: "Increased community engagement by professional journalists, on their own, will not solve the problem of making the news more relevant to everyone because traditional news organizations already have abandoned many communities, leaving behind news deserts.", trans: "전문 기자들의 지역사회 참여 증가만으로는 뉴스를 모든 사람에게 더 관련성 있게 만드는 문제를 해결할 수 없는데, 전통적인 언론 기관들이 이미 많은 지역을 떠나 ‘뉴스 사막’을 남겼기 때문이다.", med: "engagement, news deserts", high: "relevant, news deserts" },
        { pId: "6", text: "In those places, citizens must take up the responsibility for discovering information, holding the powerful accountable, and telling the news for themselves and their neighbors.", trans: "그러한 곳에서는 시민들이 정보를 발견하고, 권력자를 감시하며, 자신과 이웃을 위해 뉴스를 전달하는 책임을 맡아야 한다.", med: "powerful accountable", high: "citizens, accountable" },

        { pId: "6", text: "Journalism, perhaps like never before, belongs to the people rather than to professional journalists, wealthy publishers, or even corporate shareholders.", trans: "저널리즘은 아마도 그 어느 때보다도 전문 기자나 부유한 출판업자, 기업 주주가 아니라 대중의 것이 되었다.", med: "belongs to, rather than", high: "Journalism, shareholders" },
        { pId: "6", text: "The same technology that has shifted the balance of power toward the people gives them the tools to act as broadcasters and publishers of information essential to their immediate community — and, more critically, to serve as gatekeepers to information for other people around them.", trans: "권력의 균형을 대중 쪽으로 이동시킨 바로 그 기술이 그들에게 지역사회에 필수적인 정보를 전달하는 방송자이자 출판자로 행동할 수 있는 도구를 제공한다 — 그리고 더 중요하게는 주변 사람들을 위한 정보의 ‘게이트키퍼’ 역할을 하게 한다.", med: "shifted the balance, gatekeepers", high: "balance, gatekeepers" },

        { pId: "7", text: "It is a myth that all ideas are equally valid, even those with little or no objective proof.", trans: "객관적인 증거가 거의 없거나 전혀 없는 생각까지 포함해 모든 아이디어가 동등하게 타당하다는 것은 신화에 불과하다.", med: "myth, equally valid", high: "myth, proof" },
        { pId: "7", text: "The existence of science is the commitment to objective truth.", trans: "과학의 존재 자체는 객관적 진리에 대한 헌신이다.", med: "existence, commitment to", high: "existence, commitment, truth" },
        { pId: "7", text: "After all, science is true: fire is hot, the wheel is efficient, birds and planes can fly, we’ve landed on a comet and traveled to the Moon, antibiotics treat illness, and immunizations keep us from getting sick.", trans: "결국 과학은 참이다: 불은 뜨겁고, 바퀴는 효율적이며, 새와 비행기는 날 수 있고, 우리는 혜성에 착륙하고 달에 갔으며, 항생제는 질병을 치료하고, 백신은 우리가 병에 걸리지 않도록 한다.", med: "efficient, landed on, immunizations", high: "efficient, comet, Moon" },
        { pId: "7", text: "These accomplishments are made possible by objective truths.", trans: "이러한 성취들은 객관적 진리 덕분에 가능하다.", med: "accomplishments, possible by", high: "accomplishments, objective" },
        { pId: "7", text: "A plausible theory can, and frequently does, push science forward.", trans: "그럴듯한 이론은 실제로 종종 과학을 발전시킨다.", med: "plausible theory, push forward", high: "plausible, push forward" },
        { pId: "7", text: "However, an intuition must be followed with testing that confirms or disproves its veracity.", trans: "그러나 직관은 그것의 진위를 확인하거나 반박하는 검증을 반드시 뒤따라야 한다.", med: "intuition, confirms or disproves", high: "intuition, veracity" },
        { pId: "7", text: "If a theory is disproved, one should consider it as a reason to reject or alter the hypothesis, not a justification to just keep firmly holding to the hypothesis because you are instinctively wedded to it.", trans: "만약 이론이 반박된다면, 그것을 가설을 거부하거나 수정해야 할 이유로 삼아야지, 본능적으로 애착이 간다는 이유로 계속 고집할 근거로 삼아서는 안 된다.", med: "disproved, justification, wedded", high: "reject, alter, wedded" },
        { pId: "7", text: "Critical thinking is an absolute must, and we must respect evidence.", trans: "비판적 사고는 반드시 필요하며, 우리는 증거를 존중해야 한다.", med: "critical thinking, absolute must", high: "critical, must, evidence" },
        { pId: "7", text: "It’s the only reason for anyone to trust anything about reality.", trans: "그것이야말로 사람들이 현실에 대해 무엇이든 신뢰할 수 있는 유일한 이유이다.", med: "only reason, trust reality", high: "reality, reason, trust" },
        { pId: "7", text: "Without testing and evidence, intuition is useful, but it is never the ultimate word.", trans: "검증과 증거가 없다면, 직관은 유용할 수는 있지만 결코 최종적인 판단 기준이 될 수는 없다.", med: "ultimate word", high: "testing, intuition, ultimate" },
        // [20-23] 8번 지문 (8문장)
        { pId: "8", text: "If you suffer from social angst, awkwardness, or dread, know that this is a perfectly normal response.", trans: "사회적 불안, 어색함, 혹은 두려움을 느낀다면, 이것이 매우 정상적인 반응이라는 것을 알아라.", med: "suffer from, perfectly normal", high: "angst, awkwardness, dread" },
        { pId: "8", text: "No matter what it looks like, a lot of people are dealing with internal anxiety in social situations.", trans: "겉으로 어떻게 보이든, 많은 사람들이 사회적 상황에서 내적 불안을 겪고 있다.", med: "no matter, dealing with anxiety", high: "no matter, internal, anxiety" },
        { pId: "8", text: "But it is actually possible to build your social muscle and use it to boost your connections — and your anxiety is giving you clues to what icebreakers and lifelines other people might be grateful for you to extend.", trans: "그러나 실제로 사회적 능력을 키우고 그것을 인간관계를 강화하는 데 사용할 수 있다 — 그리고 당신의 불안은 다른 사람들이 고마워할 수 있는 대화의 시작이나 도움의 손길이 무엇인지에 대한 단서를 제공하고 있다.", med: "social muscle, icebreakers, lifelines", high: "muscle, icebreakers, lifelines" },
        { pId: "8", text: "Truly listen to what your anxiety is signaling to you about where you feel uncertain or insecure, and practice empathy by offering a hand to others who might be in the same boat.", trans: "당신이 어디에서 불확실하거나 불안한지에 대해 불안이 보내는 신호를 진심으로 들어라, 그리고 같은 처지에 있을 수 있는 다른 사람들에게 도움을 주며 공감을 실천하라.", med: "signaling, practice empathy", high: "signaling, empathy, boat" },
        { pId: "8", text: "Remember that flipping anxiety into compassion is something inherent in you — it is, in fact, what your anxiety was designed to do for you.", trans: "불안을 연민으로 바꾸는 것은 당신 안에 본래 존재하는 능력이라는 것을 기억하라 — 사실 그것이 바로 불안이 당신을 위해 만들어진 이유이다.", med: "flipping anxiety, inherent in", high: "flipping, compassion, inherent" },
        { pId: "8", text: "Together, compassion and empathy can buffer against bad anxiety.", trans: "연민과 공감은 함께 부정적인 불안을 완화할 수 있다.", med: "compassion, empathy, buffer", high: "compassion, empathy, buffer" },
        { pId: "8", text: "You can use your anxiety to be more outward-facing.", trans: "당신은 불안을 더 외향적으로 행동하는 데 활용할 수 있다.", med: "use anxiety, outward-facing", high: "outward-facing" },
        { pId: "8", text: "The outcome? The spread of compassion for your fellow human beings, other species, and the planet!", trans: "그 결과는 무엇인가? 인류, 다른 생명체, 그리고 지구에 대한 연민의 확산이다!", med: "outcome, fellow human beings", high: "outcome, species, planet" }
    ];

    let currentQuestions = [];

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function loadWrongNotes() {
        const saved = localStorage.getItem('mgh_final_notes');
        const listArea = document.getElementById('wrong-list');
        if (saved) {
            const items = JSON.parse(saved);
            if (items.length > 0) {
                listArea.innerHTML = items.map(it => `
                    <div class="wrong-item">
                        <div class="wrong-trans">${it.trans}</div>
                        <div class="wrong-ans">정답: ${it.text}</div>
                    </div>`).join('');
                return;
            }
        }
        listArea.innerHTML = "오답 기록이 없습니다.";
    }

    function saveWrongNote(it) {
        let saved = localStorage.getItem('mgh_final_notes');
        let items = saved ? JSON.parse(saved) : [];
        if (!items.some(i => i.text === it.text)) {
            items.push(it);
            localStorage.setItem('mgh_final_notes', JSON.stringify(items));
        }
    }

    function clearWrongNotes() {
        if(confirm("기록을 삭제할까요?")) {
            localStorage.removeItem('mgh_final_notes');
            loadWrongNotes();
        }
    }

    function generate() {
        const root = document.getElementById('quiz-area');
        const filter = document.getElementById('passage-filter').value;
        const scoreDisplay = document.getElementById('score-display');
        
        scoreDisplay.style.display = "none";
        
        let pool = (filter === 'all') ? shuffle([...sentenceDB]).slice(0, 15) : shuffle(sentenceDB.filter(s => s.pId === filter));
        currentQuestions = pool;
        
        if(pool.length === 0) {
            root.innerHTML = "<p style='text-align:center; padding:20px;'>해당 지문에 문장이 없습니다.</p>";
            return;
        }

        const part = Math.ceil(pool.length / 3);
        let html = '';
        const render = (set, cls, lbl, start) => {
            if (set.length === 0) return;
            html += `<div class="level-header ${cls}">${lbl}</div>`;
            set.forEach((s, i) => {
                let content = (cls === 'low') ? `<div class="scrambled">(${shuffle(s.text.replace(/[.,“”]/g, '').split(' ')).join(' / ')})</div>` : `<div class="hint">${cls === 'med' ? '💡 힌트: ' + s.med : '🔑 키워드: ' + s.high}</div>`;
                html += `<div class="q-card"><div class="trans">Q${start+i+1}. ${s.trans}</div>${content}<textarea id="input-${start+i}" placeholder="정답을 입력하세요..."></textarea><div id="mark-${start+i}" class="result-mark"></div><div class="ans-area" id="ans-${start+i}">${s.text}</div></div>`;
            });
        };
        render(pool.slice(0, part), 'low', '하: 단어 배열 (모든 단어 사용)', 0);
        render(pool.slice(part, part*2), 'med', '중: 구문 힌트 영작', part);
        render(pool.slice(part*2), 'high', '상: 핵심 키워드 영작', part*2);
        
        root.innerHTML = html;
        loadWrongNotes();
        window.scrollTo(0, 0);
    }

    function gradeQuiz() {
        let score = 0;
        currentQuestions.forEach((s, i) => {
            const clean = (str) => str.toLowerCase().trim().replace(/[.,“”—()!?;:]/g, '').replace(/\s+/g, ' ');
            const user = clean(document.getElementById(`input-${i}`).value);
            const correct = clean(s.text);
            const mark = document.getElementById(`mark-${i}`);
            if (user === correct) { score++; mark.innerHTML = "✅ 정답입니다!"; mark.className = "result-mark correct"; }
            else { mark.innerHTML = "❌ 오답입니다."; mark.className = "result-mark incorrect"; saveWrongNote(s); }
            mark.style.display = "block";
        });
        const board = document.getElementById('score-display');
        board.innerHTML = `최종 점수: ${score} / ${currentQuestions.length}`;
        board.style.display = "block";
        loadWrongNotes();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function toggleAnswers() {
        const areas = document.querySelectorAll('.ans-area');
        const isHidden = (areas.length > 0 && (areas.style.display === 'none' || areas.style.display === ''));
        areas.forEach(a => a.style.display = isHidden ? 'block' : 'none');
    }

    window.onload = generate;
</script>
